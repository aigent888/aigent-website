<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIGENT AI 玄学馆 · 太上问道</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap');

  :root {
    --gold:#d4a843; --gold-light:#f0d680; --gold-dark:#8b6914;
    --red:#c41e3a; --red-bright:#e63946; --red-dark:#7f1d1d;
    --ink:#0d0a06; --ink-mid:#1a1410; --ink-light:#261e16;
    --paper:#f5f0e8; --text:#c4b898; --text-dim:#7a6a4a;
    --jade:#5b8c5a; --purple:#6b3fa0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Serif SC','STSong','SimSun',serif;
    background:var(--ink);color:var(--text);min-height:100vh;
    overflow-x:hidden;
  }

  /* ── Cosmic Background ── */
  #cosmos{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.3}
  .star{position:absolute;background:var(--gold-light);border-radius:50%;animation:twinkle 4s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:0.5}}
  .cloud{position:absolute;width:200px;height:60px;border-radius:50%;background:radial-gradient(ellipse,rgba(212,168,67,0.06),transparent 70%);animation:drift 20s linear infinite}
  @keyframes drift{0%{transform:translateX(-200px)}100%{transform:translateX(calc(100vw+200px))}}

  /* ── Main Container ── */
  .main{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:30px 20px 80px}

  /* ── Gate / Header ── */
  .gate{text-align:center;margin-bottom:40px;padding-top:20px;position:relative}
  .gate-arch{width:180px;height:180px;margin:0 auto 20px;position:relative}
  .gate-ring{width:100%;height:100%;border:3px solid var(--gold);border-radius:50%;animation:pulse 4s ease-in-out infinite;position:relative}
  .gate-ring::before{content:'';position:absolute;inset:8px;border:1px solid rgba(212,168,67,0.3);border-radius:50%}
  .gate-ring::after{content:'';position:absolute;inset:20px;border:1px solid rgba(212,168,67,0.12);border-radius:50%}
  @keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(212,168,67,0.2)}50%{box-shadow:0 0 60px rgba(212,168,67,0.45)}}

  .laojun-icon{position:absolute;inset:16px;display:flex;align-items:center;justify-content:center;font-size:72px;animation:float 6s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

  .gate h1{font-family:'Ma Shan Zheng','Noto Serif SC',cursive;font-size:52px;color:var(--gold);letter-spacing:8px;font-weight:400;line-height:1.2}
  .gate .oracle{font-size:13px;color:var(--text-dim);letter-spacing:6px;margin-top:4px}

  /* ── Incense Smoke Effect ── */
  .smoke{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:2px;height:80px;background:linear-gradient(to top,rgba(212,168,67,0.4),transparent);animation:smoke 3s ease-in-out infinite}
  .smoke:nth-child(2){left:calc(50% - 30px);animation-delay:1s;height:60px}
  .smoke:nth-child(3){left:calc(50% + 30px);animation-delay:2s;height:70px}
  @keyframes smoke{0%,100%{opacity:0.2;transform:translateX(-50%) scaleX(1)}50%{opacity:0.6;transform:translateX(-50%) scaleX(3)}}

  /* ── Decorative Divider ── */
  .hr{text-align:center;margin:24px 0;color:var(--gold-dark);font-size:8px;letter-spacing:6px;user-select:none}

  /* ── Tabs ── */
  .tabs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:24px}
  .tab{padding:14px 8px;text-align:center;border:1px solid rgba(212,168,67,0.15);border-radius:12px;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all 0.4s;font-family:inherit;background:transparent;letter-spacing:2px}
  .tab .tab-icon{font-size:24px;display:block;margin-bottom:4px}
  .tab:hover{border-color:var(--gold);color:var(--gold)}
  .tab.active{border-color:var(--gold);color:var(--gold);background:linear-gradient(180deg,rgba(212,168,67,0.08),rgba(212,168,67,0.02));box-shadow:0 4px 20px rgba(212,168,67,0.08)}

  /* ── Cards ── */
  .card{background:var(--ink-mid);border:1px solid rgba(212,168,67,0.1);border-radius:16px;padding:28px 24px;margin-bottom:16px;transition:all 0.5s;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(to right,transparent,rgba(212,168,67,0.3),transparent)}
  .card.active{border-color:rgba(212,168,67,0.3);box-shadow:0 0 40px rgba(212,168,67,0.04)}

  /* ── Form ── */
  label{display:block;font-size:11px;color:var(--text-dim);letter-spacing:3px;margin-bottom:6px;text-transform:uppercase}
  input,select,textarea{width:100%;padding:13px 16px;margin-bottom:10px;background:rgba(0,0,0,0.35);border:1px solid rgba(212,168,67,0.15);border-radius:10px;color:var(--paper);font-size:14px;font-family:inherit;outline:none;transition:all 0.3s}
  input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(212,168,67,0.08)}
  input::placeholder{color:rgba(180,160,130,0.25)}
  textarea{resize:vertical;min-height:80px}
  .row{display:flex;gap:8px}.row>*{flex:1}

  /* ── Buttons ── */
  .btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:3px;font-family:inherit;transition:all 0.4s;color:#fff;position:relative;overflow:hidden}
  .btn-gold{background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-dark));color:#1a1410}
  .btn-gold:hover{box-shadow:0 8px 30px rgba(212,168,67,0.3);transform:translateY(-1px)}
  .btn-gold:active{transform:scale(0.97)}
  .btn-red{background:linear-gradient(135deg,var(--red-dark),var(--red),var(--red-dark))}
  .btn-red:hover{box-shadow:0 8px 30px rgba(196,30,58,0.3)}
  .btn-sm{padding:10px 18px;font-size:12px;width:auto;letter-spacing:1px}
  .btn-outline{width:100%;padding:12px;background:transparent;border:1px solid var(--gold);border-radius:10px;color:var(--gold);font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:2px;transition:all 0.3s}
  .btn-outline:hover{background:rgba(212,168,67,0.05)}
  .btn-outline.connected{border-color:var(--jade);color:var(--jade)}

  /* ── Tier Select ── */
  .tiers{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
  .tier-btn{flex:1;padding:12px 6px;text-align:center;border:1px solid rgba(212,168,67,0.15);border-radius:10px;cursor:pointer;font-size:12px;color:var(--text-dim);transition:all 0.3s;font-family:inherit;background:transparent;line-height:1.5}
  .tier-btn .emoji{font-size:22px;display:block;margin-bottom:2px}
  .tier-btn:hover{border-color:var(--gold)}
  .tier-btn.selected{border-color:var(--gold);background:rgba(212,168,67,0.08);color:var(--gold)}
  .tier-btn.master.selected{border-color:var(--purple);background:rgba(107,63,160,0.1);color:#c9a0ff}

  /* ── Loading ── */
  .loading-wrapper{text-align:center;padding:48px 20px}
  .trigram{width:80px;height:80px;margin:0 auto 24px;position:relative;animation:spin 4s linear infinite}
  .trigram::before{content:'☰';font-size:60px;color:var(--gold);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;animation:changeTrigram 1s steps(1) infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes changeTrigram{0%,25%{content:'☰'}25%,50%{content:'☷'}50%,75%{content:'☵'}75%,100%{content:'☲'}}
  .loading-text{font-size:15px;color:var(--gold);letter-spacing:4px;animation:fadeT 2s ease-in-out infinite}
  @keyframes fadeT{0%,100%{opacity:0.3}50%{opacity:1}}

  /* ── Result ── */
  .result-score{text-align:center;font-size:64px;font-weight:900;color:var(--gold);line-height:1;text-shadow:0 0 30px rgba(212,168,67,0.3);margin-bottom:4px}
  .result-label{text-align:center;font-size:12px;color:var(--text-dim);letter-spacing:4px;margin-bottom:20px}
  .result-block{padding:14px 0;border-bottom:1px solid rgba(212,168,67,0.06)}
  .result-block:last-child{border-bottom:none}
  .result-block .rl{font-size:10px;color:var(--gold-dark);letter-spacing:2px;margin-bottom:4px}
  .result-block .rv{font-size:14px;color:var(--paper);line-height:1.7}
  .highlight-box{margin-top:18px;padding:16px;background:rgba(212,168,67,0.04);border-radius:10px;text-align:center;font-size:16px;color:var(--gold-light);letter-spacing:1px}

  /* ── Tarot Cards ── */
  .tarot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .tarot-card{padding:20px 8px;text-align:center;border:1px solid rgba(212,168,67,0.15);border-radius:12px;cursor:pointer;transition:all 0.4s;background:rgba(0,0,0,0.2);position:relative}
  .tarot-card:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(212,168,67,0.15);transform:translateY(-2px)}
  .tarot-card.selected{border-color:var(--gold);background:rgba(212,168,67,0.1);box-shadow:0 0 25px rgba(212,168,67,0.25)}
  .tarot-card.chosen{border-color:var(--purple);animation:revealCard 0.6s ease-out}
  @keyframes revealCard{0%{transform:rotateY(180deg)}100%{transform:rotateY(0)}}
  .tarot-icon{font-size:36px;margin-bottom:6px}
  .tarot-name{font-size:11px;color:var(--text-dim);letter-spacing:1px}

  /* ── Share ── */
  .share-row{display:flex;gap:8px;margin-top:18px}
  .share-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:11px;cursor:pointer;color:#fff;letter-spacing:1px;font-family:inherit;transition:all 0.3s}
  .share-btn.x{background:#1da1f2}.share-btn.dc{background:#5865f2}.share-btn.cp{background:var(--gold-dark)}
  .share-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}

  /* ── Misc ── */
  .hidden{display:none!important}.fade-in{animation:fadeIn 0.5s ease-out}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--gold-dark);color:#fff;padding:12px 24px;border-radius:20px;font-size:13px;z-index:999;letter-spacing:1px;animation:fadeIn 0.3s}

  @media(max-width:480px){
    .tabs{grid-template-columns:1fr 1fr}.tarot-grid{grid-template-columns:repeat(2,1fr)}
    .tiers{grid-template-columns:1fr}.gate h1{font-size:38px}.gate-arch{width:140px;height:140px}
    .result-score{font-size:48px}.main{padding:15px 12px 60px}
  }
</style>
</head>

<script>
// ══════════════════════════════════
//  State
// ══════════════════════════════════
const AIGENT='0xE54357D170e2521C1638e2c8Ec138EECEbfC3e39',REVENUE='0x38bA1dD6cA31c8b2971de7c61A87f1F7c4Eba7e4',AGENT='http://localhost:3456';
let currentService='fortune',currentTier='free',wallet=null,signer=null,selectedCard=null;
const TIERS={free:{price:0,burn:0,rev:0},standard:{price:100,burn:70,rev:30},master:{price:500,burn:350,rev:150}};
const PRICES={free:'免费 · 本地算法',standard:'⚡ 燃烧 70 · 收入 30 AIGENT',master:'👑 燃烧 350 · 收入 150 AIGENT'};

// ══════════════════════════════════
//  Init
// ══════════════════════════════════
(function(){
  // Cosmos
  for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-delay:${Math.random()*4}s`;document.getElementById('cosmos').appendChild(s)}
  for(let i=0;i<6;i++){const c=document.createElement('div');c.className='cloud';c.style.cssText=`top:${10+Math.random()*70}%;animation-delay:${Math.random()*20}s;animation-duration:${15+Math.random()*25}s;opacity:${0.3+Math.random()*0.5}`;document.getElementById('cosmos').appendChild(c)}
  // Populate selects
  const now=new Date().getFullYear();
  ['f-year'].forEach(id=>{const s=document.getElementById(id);for(let i=now-80;i<=now-8;i++){const o=document.createElement('option');o.value=i;o.textContent=i+' 年';s.appendChild(o)}s.value='1995'});
  ['f-month'].forEach(id=>{const s=document.getElementById(id);for(let i=1;i<=12;i++){const o=document.createElement('option');o.value=i;o.textContent=i+' 月';s.appendChild(o)}s.value='6'});
  ['f-day'].forEach(id=>{const s=document.getElementById(id);for(let i=1;i<=31;i++){const o=document.createElement('option');o.value=i;o.textContent=i+' 日';s.appendChild(o)}s.value='15'});

//  Navigation

function switchService(svc){
  currentService=svc;currentTier='free';
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tabs .tab:nth-child(${{fortune:1,naming:2,tarot:3,dream:4}[svc]})`).classList.add('active');
  ['fortune','naming','tarot','dream'].forEach(s=>document.getElementById(`panel-${s}`).classList.toggle('hidden',s!==svc));
  document.getElementById('result-panel').classList.add('hidden');
  document.getElementById('loading-panel').classList.add('hidden');
  resetTierUI();
}

function selectTier(tier){
  currentTier=tier;
  const cards=['fortune','naming','tarot','dream'].map(s=>document.getElementById(`panel-${s}`));
  cards.forEach(card=>{
    if(!card.classList.contains('hidden')){
      card.querySelectorAll('.tier-btn').forEach(b=>b.classList.remove('selected'));
      const idx=tier==='free'?0:tier==='standard'?1:2;
      card.querySelectorAll('.tier-btn')[idx].classList.add('selected');
    }
  });
  resetTierUI();
}

function resetTierUI(){
  const suffix={fortune:'f',naming:'n',tarot:'t',dream:'d'}[currentService];
  const cfg=TIERS[currentTier];
  const isPaid=currentTier!=='free';
  document.getElementById(`${suffix}-wallet-block`).style.display=isPaid?'block':'none';
  document.getElementById(`${suffix}-price-note`).textContent=isPaid?PRICES[currentTier]:'仅供娱乐 · 本地生成 · 不可当真';
  const btn=document.getElementById(`${suffix}-btn`);
  btn.className=`btn ${isPaid?'btn-red':'btn-gold'}`;
  btn.textContent=isPaid?`🔥 支付 ${cfg.price} AIGENT`:'🥠 免费测算';
}

// ══════════════════════════════════
//  Wallet
// ══════════════════════════════════
async function connectMysticWallet(){
  if(!window.ethereum){toast('请安装 MetaMask 或 OKX Wallet');return}
  try{
    const p=new ethers.BrowserProvider(window.ethereum);
    const s=await p.getSigner();
    wallet=await s.getAddress();signer=s;
    document.querySelectorAll('[id$="-btn-wallet"]').forEach(b=>{b.textContent=`✅ ${wallet.slice(0,6)}...${wallet.slice(-4)}`;b.classList.add('connected')});
    document.querySelectorAll('[id$="-wallet-info"]').forEach(p=>p.textContent='已连接');
    ['f','n','t','d'].forEach(s=>document.getElementById(`${s}-wallet`).value=wallet);
  }catch(e){toast('连接失败')}
}

window.ethereum?.on('accountsChanged',()=>{wallet=null;signer=null;location.reload()});

// ══════════════════════════════════
//  Payment
// ══════════════════════════════════
async function pay(tier){
  if(tier==='free')return true;
  if(!signer){toast('请先连接钱包');return false}
  const cfg=TIERS[tier];
  try{
    const abi=['function burn(uint256)','function transfer(address,uint256) returns (bool)'];
    const token=new ethers.Contract(AIGENT,abi,signer);
    if(cfg.burn>0){await(await token.burn(BigInt(cfg.burn)*10n**18n)).wait()}
    if(cfg.rev>0){await(await token.transfer(REVENUE,BigInt(cfg.rev)*10n**18n)).wait()}
    return true;
  }catch(e){toast('支付失败: '+(e.reason||'余额不足'));return false}
}

// ══════════════════════════════════
//  AI Call
// ══════════════════════════════════
async function callAI(prompt,tier){
  try{
    const r=await fetch(`${AGENT}/api/fortune`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,tier})});
    if(r.ok){const t=await r.text();const m=t.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0])}
  }catch{}
  // Fallback: direct Claude if key in localStorage
  const key=localStorage.getItem('anthropic_key');
  if(key){try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:'你是一位精通东方玄学的命理大师。回复JSON。',messages:[{role:'user',content:prompt}]})});if(r.ok){const d=await r.json();const m=d.content[0].text.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0])}}catch{}}
  return null;
}

function showLoading(msg,sub){document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));const l=document.getElementById('loading-panel');l.classList.remove('hidden');l.classList.add('fade-in');document.getElementById('loading-msg').textContent=msg;document.getElementById('loading-sub').textContent=sub||''}
function showResult(html){document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));const r=document.getElementById('result-panel');r.classList.remove('hidden');r.classList.add('fade-in');r.innerHTML=html;r.scrollIntoView({behavior:'smooth',block:'center'})}
function shareResult(text){const share=`${text}\n\n🔮 太上问道 · AIGENT AI 玄学馆\nhttps://www.aigent.ink/mystic\n#AIGENT #太上问道`;return`
  <div class="share-row">
    <button class="share-btn x" onclick="window.open('https://x.com/intent/post?text=${encodeURIComponent(share)}','_blank')">𝕏 分享</button>
    <button class="share-btn dc" onclick="navigator.clipboard.writeText('${share.replace(/'/g,"\\'")}');toast('已复制！粘贴到 Discord')">💬 复制</button>
    <button class="share-btn cp" onclick="resetAll()">🔄 再来一次</button>
  </div>`}

function resetAll(){document.getElementById('result-panel').classList.add('hidden');document.getElementById('loading-panel').classList.add('hidden');switchService(currentService)}

async function startFortune(){
  const y=document.getElementById('f-year').value,m=document.getElementById('f-month').value,d=document.getElementById('f-day').value,h=document.getElementById('f-hour').value,g=document.getElementById('f-gender').value,q=document.getElementById('f-question').value;
  if(!y||!m||!d||!h){toast('请填写完整生辰');return}
  if(!await pay(currentTier))return;
  showLoading('天机演算中','AI 正在解读命盘...');
  const sh=['子时','丑时','寅时','卯时','辰时','巳时','午时','未时','申时','酉时','戌时','亥时'][parseInt(h)];
  const zodiac=((parseInt(y)-4)%12+12)%12;const z=['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'][zodiac];
  const el=parseInt(y)%10;const e=['金','金','水','水','木','木','火','火','土','土'][el];
  const prompt=`为${g==='male'?'男':'女'}性，${y}年${m}月${d}日${sh}出生（生肖${z}，五行${e}），问${q||'综合运势'}的人推算今日运势。回复JSON:{"score":50-98,"fortune":"运势总结","love":"姻缘","wealth":"财运","career":"事业","lucky":"幸运物","advice":"建议"}`;
  let r=currentTier!=='free'?await callAI(prompt,currentTier):null;
  if(!r)r=localFortune(y,m,d,h,g,q);
  showResult(`
    <div style="text-align:center;margin-bottom:4px;font-size:10px;color:var(--gold-dark);letter-spacing:2px">${currentTier!=='free'?'🔥 AI 深度命盘 · 链上验证':''}</div>
    <div class="result-score">${r.score}</div><div class="result-label">综 合 命 理 评 分</div>
    <div class="result-block"><div class="rl">🔮 今日运势</div><div class="rv">${r.fortune}</div></div>
    <div class="result-block"><div class="rl">💕 姻缘</div><div class="rv">${r.love}</div></div>
    <div class="result-block"><div class="rl">💰 财运</div><div class="rv">${r.wealth}</div></div>
    <div class="result-block"><div class="rl">🚀 事业</div><div class="rv">${r.career}</div></div>
    <div class="highlight-box">🍀 ${r.lucky}</div>
    <div class="result-block"><div class="rl">🧘 太上建言</div><div class="rv">${r.advice}</div></div>
    ${shareResult(`🔮 今日命理 ${r.score}分 | ${r.fortune} | 🍀 ${r.lucky}`)}
  `);
}

function localFortune(y,m,d,h,g,q){
  const seed=(y+m+d+h+g+q).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rd=(min,max)=>{const x=Math.sin(seed*9301+min*49297)*233280;return Math.floor(min+Math.abs(x-Math.floor(x))*(max-min))};
  const fs=['紫气东来，贵人暗助。','财星高照，宜守本心。','桃花入命，良缘在望。','天机星现，大胆前行。','玄武当值，静养为上。'];
  return{score:rd(55,95),fortune:fs[rd(0,5)],love:['桃花旺盛，单身宜社交。','红鸾微动，旧人可守。','桃花带煞，静待花开。'][rd(0,3)],wealth:['财帛宫明，宜理财。','正财稳健，勿投机。','财星晦暗，宜守成。'][rd(0,3)],career:['事业有贵人助。','官禄平稳，积蓄力量。','小阻不足虑，转机将至。'][rd(0,3)],lucky:`金色 · ${['8','6','9','15','24'][rd(0,5)]} · ${['玉','水晶','红绳','铜钱','玛瑙'][rd(0,5)]}`,advice:`${z}年吉日，东方为吉位。静坐片刻，心静则万事明。`};
}
