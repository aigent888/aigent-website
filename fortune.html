<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Ma+Shan+Zheng&display=swap');

  :root {
    --gold: #c9a96e;
    --gold-light: #e0c88a;
    --gold-dark: #8b6914;
    --ink: #1a1410;
    --ink-light: #2a2218;
    --paper: #f5f0e8;
    --red: #8b1a1a;
    --red-bright: #c41e3a;
    --text: #d4c5b2;
    --text-dim: #8a7a6a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
    background: var(--ink);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Particles Background ── */
  #particles {
    position: fixed; inset:0; z-index:0; pointer-events:none;
    opacity: 0.4;
  }
  .particle {
    position: absolute;
    color: var(--gold);
    font-size: 16px;
    animation: floatUp 8s linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(105vh) rotate(0deg) scale(0); opacity:0; }
    10% { opacity:0.6; }
    90% { opacity:0.1; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity:0; }
  }

  /* ── Main Container ── */
  .main {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto; padding: 40px 20px 80px;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Header ── */
  .header {
    text-align: center; margin-bottom: 48px; padding-top: 30px;
  }
  .header-icon {
    width: 80px; height: 80px; margin: 0 auto 20px;
    border: 2px solid var(--gold); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    background: radial-gradient(circle, rgba(201,169,110,0.12) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 20px rgba(201,169,110,0.15); }
    50% { box-shadow: 0 0 40px rgba(201,169,110,0.35); }
  }
  .header h1 {
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
    font-size: 42px; color: var(--gold); font-weight: 400;
    letter-spacing: 4px; margin-bottom: 6px;
  }
  .header .subtitle {
    font-size: 13px; color: var(--text-dim); letter-spacing: 6px;
    text-transform: uppercase;
  }

  /* ── Decorative Line ── */
  .divider {
    text-align: center; margin: 20px 0 32px;
    color: var(--gold-dark); font-size: 8px; letter-spacing: 8px;
  }

  /* ── Cards ── */
  .card {
    background: var(--ink-light);
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 16px; padding: 32px 28px;
    backdrop-filter: blur(10px);
    transition: all 0.4s ease;
  }
  .card.active { border-color: rgba(201,169,110,0.4); box-shadow: 0 0 30px rgba(201,169,110,0.08); }

  /* ── Steps ── */
  .step-indicator {
    display: flex; justify-content: center; gap: 12px; margin-bottom: 32px;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold-dark); transition: all 0.4s;
  }
  .step-dot.done { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .step-dot.active { background: var(--gold-light); box-shadow: 0 0 12px var(--gold-light); animation: pulse 1.5s infinite; }

  /* ── Form ── */
  label {
    display: block; font-size: 12px; color: var(--text-dim);
    letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase;
  }
  .input-group {
    margin-bottom: 20px;
  }
  input, select {
    width: 100%; padding: 14px 18px;
    background: rgba(0,0,0,0.3); border: 1px solid rgba(201,169,110,0.2);
    border-radius: 10px; color: var(--paper); font-size: 15px;
    font-family: inherit; outline: none; transition: all 0.3s;
  }
  input:focus, select:focus {
    border-color: var(--gold); box-shadow: 0 0 16px rgba(201,169,110,0.1);
  }
  input::placeholder { color: rgba(180,160,140,0.3); }
  select { appearance: none; cursor: pointer; }
  select option { background: var(--ink-light); color: var(--paper); }

  .form-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .radio-group {
    display: flex; gap: 8px;
  }
  .radio-btn {
    flex:1; padding:12px; text-align:center;
    border:1px solid rgba(201,169,110,0.2); border-radius:10px;
    cursor:pointer; transition:all 0.3s; font-size:14px; color:var(--text-dim);
  }
  .radio-btn:hover { border-color: var(--gold); color: var(--gold); }
  .radio-btn.selected { border-color: var(--gold); background: rgba(201,169,110,0.1); color: var(--gold); }

  /* ── Button ── */
  .btn-primary {
    width: 100%; padding: 16px; margin-top: 12px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
    border: none; border-radius: 12px;
    color: #1a1410; font-size: 17px; font-weight: 700;
    font-family: inherit; letter-spacing: 3px; cursor: pointer;
    transition: all 0.4s; position: relative; overflow: hidden;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(201,169,110,0.3);
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled {
    opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none;
  }
  .btn-outline {
    width: 100%; padding: 14px; margin-top: 8px;
    background: transparent; border: 1px solid var(--gold);
    border-radius: 12px; color: var(--gold); font-size: 14px;
    font-family: inherit; letter-spacing: 2px; cursor: pointer;
    transition: all 0.3s;
  }
  .btn-outline:hover { background: rgba(201,169,110,0.05); }
  .btn-outline.connected { border-color: var(--green); color: var(--green); }

  /* Tier */
  .tier-btn {
    flex:1; padding:12px 8px; text-align:center;
    border:1px solid rgba(201,169,110,0.2); border-radius:10px;
    background:transparent; color:var(--text-dim); cursor:pointer;
    font-family:inherit; font-size:13px; line-height:1.5;
    transition:all 0.3s;
  }
  .tier-btn small { font-size:9px; opacity:0.7; display:block; margin-top:2px; }
  .tier-btn:hover { border-color: var(--gold); }
  .tier-btn.selected { border-color: var(--gold); background: rgba(201,169,110,0.1); color: var(--gold); }
  .tier-btn.premium.selected { border-color: var(--red-bright); background: rgba(196,30,58,0.12); color: var(--red-bright); }

  /* ── Loading ── */
  .loading-container {
    text-align: center; padding: 48px 20px;
  }
  .bagua {
    width: 100px; height: 100px; margin: 0 auto 24px;
    border: 3px solid var(--gold); border-radius: 50%;
    position: relative; animation: spin 3s linear infinite;
  }
  .bagua::before {
    content:''; position:absolute; top:50%; left:0; right:0; height:3px;
    background: var(--gold); transform:translateY(-50%);
  }
  .bagua::after {
    content:'☯'; position:absolute; inset:8px; display:flex;
    align-items:center; justify-content:center;
    font-size:36px; color:var(--gold);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 15px; color: var(--gold); letter-spacing: 4px;
    animation: fadeText 2s ease-in-out infinite;
  }
  @keyframes fadeText { 0%,100%{opacity:0.4;} 50%{opacity:1;} }

  /* ── Result Card ── */
  .result-header {
    text-align: center; margin-bottom: 24px;
  }
  .result-score {
    font-size: 72px; font-weight: 900; color: var(--gold);
    line-height: 1; letter-spacing: -2px;
    text-shadow: 0 0 40px rgba(201,169,110,0.4);
  }
  .result-score-label {
    font-size: 13px; color: var(--text-dim); letter-spacing: 4px; margin-top: 4px;
  }
  .result-item {
    padding: 16px 0; border-bottom: 1px solid rgba(201,169,110,0.08);
  }
  .result-item:last-child { border-bottom: none; }
  .result-item .label {
    font-size: 11px; color: var(--gold-dark); letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .result-item .value {
    font-size: 15px; color: var(--paper); line-height: 1.7;
  }
  .result-highlight {
    margin-top: 24px; padding: 20px;
    background: rgba(201,169,110,0.05); border-radius: 12px;
    text-align: center;
  }
  .result-highlight .big {
    font-size: 20px; color: var(--gold); font-weight: 700; letter-spacing: 2px;
  }
  .result-highlight .small {
    font-size: 12px; color: var(--text-dim); margin-top: 6px;
  }

  /* ── Share Buttons ── */
  .share-row {
    display: flex; gap: 8px; margin-top: 20px;
  }
  .share-btn {
    flex:1; padding:12px; text-align:center; border-radius:10px;
    font-size:12px; font-family:inherit; letter-spacing:1px;
    cursor:pointer; border:none; transition:all 0.3s;
    color:#fff;
  }
  .share-btn.x { background:#1da1f2; }
  .share-btn.dc { background:#5865f2; }
  .share-btn.copy { background:var(--gold-dark); }
  .share-btn:hover { filter:brightness(1.2); transform:translateY(-1px); }

  /* ── Hidden ── */
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.6s ease-out; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

  /* ── Toast ── */
  .toast {
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
    background:var(--gold-dark);color:#fff;padding:12px 24px;
    border-radius:20px;font-size:13px;z-index:99;letter-spacing:1px;
    animation: fadeIn 0.3s ease-out;
  }

  /* ── Footer ── */
  .footer {
    text-align: center; margin-top: auto; padding-top: 40px;
    font-size: 11px; color: var(--text-dim); letter-spacing: 2px;
  }
  .footer a { color: var(--gold); text-decoration: none; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .main { padding: 20px 16px 60px; }
    .header h1 { font-size: 34px; }
    .card { padding: 24px 18px; }
    .form-row { grid-template-columns: 1fr; }
    .result-score { font-size: 56px; }
  }
  }
</style>

  for (let i=0;i<30;i++) {

async function connectFortuneWallet() {
  if (!window.ethereum) { toast('请安装 MetaMask 或 OKX Wallet'); return; }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer = await provider.getSigner();
    const addr = await signer.getAddress();
    fortuneWallet = addr;
    fortuneSigner = signer;
    const bal = await provider.getBalance(addr);
    const btn = document.getElementById('btn-connect-fortune');
    btn.textContent = `✅ ${addr.slice(0,6)}...${addr.slice(-4)}`;
    btn.classList.add('connected');
    document.getElementById('wallet-status').textContent = `余额: ${ethers.formatEther(bal).slice(0,8)} OKB`;
  } catch(e) { toast('钱包连接失败'); }
}

// ── Main Flow ──
async function startReading() {
  const wallet = document.getElementById('wallet').value.trim();
  const year = document.getElementById('year').value;
  const month = document.getElementById('month').value;
  const day = document.getElementById('day').value;
  const hour = document.getElementById('hour').value;
  const question = document.getElementById('question').value.trim();

  if (!year || !month || !day || !hour) { toast(currentLang==='en'?'Select birth date':'请选择完整生辰'); return; }

  // Premium: require wallet + burn first
  if (currentTier === 'premium') {
    if (!fortuneWallet || !fortuneSigner) { toast('请先连接钱包'); return; }
    try {
      document.getElementById('step-input').classList.add('hidden');
      document.getElementById('step-loading').classList.remove('hidden');
      document.getElementById('step-loading').classList.add('fade-in');
      document.querySelector('#step-loading .loading-text').textContent = '链上燃烧 AIGENT...';
      document.querySelector('#step-loading p').textContent = '正在执行链上操作...';

      const abi = ['function burn(uint256 amount)'];
      const contract = new ethers.Contract(AIGENT_ADDR, abi, fortuneSigner);
      const tx = await contract.burn(BURN_AMOUNT);
      document.querySelector('#step-loading .loading-text').textContent = '等待确认...';
      await tx.wait();
    } catch(e) {
      document.getElementById('step-loading').classList.add('hidden');
      document.getElementById('step-input').classList.remove('hidden');
      toast('Burn failed: ' + (e.reason || e.message || 'insufficient balance'));
      return;
    }
    // Reset for AI loading
    document.querySelector('#step-loading .loading-text').textContent = '天机演算中';
    document.querySelector('#step-loading p').textContent = 'AI 深度学习你的命运轨迹...';
  } else {
    // Free: just show loading
    document.getElementById('step-input').classList.add('hidden');
    const loading = document.getElementById('step-loading');
    loading.classList.remove('hidden');
    loading.classList.add('fade-in');
  }

  try {
    const result = await fetchFortune(wallet, year, month, day, hour, gender, question, currentTier === 'premium');
    showResult(result, currentTier === 'premium');
  } catch(e) {
    console.error(e);
    document.getElementById('step-loading').classList.add('hidden');
    document.getElementById('step-input').classList.remove('hidden');
    toast('测算失败，请重试');
  }
}

async function fetchFortune(wallet, year, month, day, hour, gender, question, isPremium = false) {
  const genderText = gender === 'male' ? '男' : '女';
  const age = new Date().getFullYear() - parseInt(year);
  const q = question || (currentLang==='en'?'General':'综合运势');
  const zodiac = getZodiac(parseInt(year));
  const element = getElement(parseInt(year));
  const hourName = ['子时','丑时','寅时','卯时','辰时','巳时','午时','未时','申时','酉时','戌时','亥时'][parseInt(hour)];
  const birthInfo = `${year}年${month}月${day}日 ${hourName}`;

  // If wallet provided, try to fetch chain data
  let chainInfo = '';
  if (wallet && /^0x[a-fA-F0-9]{40}$/.test(wallet)) {
    try {
      const resp = await fetch('https://rpc.xlayer.tech', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          jsonrpc:'2.0',id:1,
          method:'eth_getBalance',
          params:[wallet,'latest']
        })
      });
      const data = await resp.json();
      if (data.result) {
        const bal = BigInt(data.result);
        chainInfo = `链上余额: ${(Number(bal)/1e18).toFixed(4)} OKB。`;
        if (bal > 1000000000000000000n) chainInfo += ' 资产雄厚，财运亨通之象。';
        else if (bal === 0n) chainInfo += ' 钱包空空，宜布局未来。';
        else chainInfo += ' 小有积蓄，稳中求进。';
      }
    } catch {}
  }

  // Call AI
  const apiKey = localStorage.getItem('anthropic_key') || '';
  const systemPrompt = `你是一位精通东方玄学的命理大师，融合易经、五行、星座和区块链数据为用户推算运势。风格：文雅古典，半文半白，有禅意。每次给出不同的独特解读。回复JSON格式：{"score":85,"fortune":"运势总结20字内","love":"姻缘解读","wealth":"财运解读","career":"事业解读","lucky":"幸运物/颜色/数字","advice":"禅意建议50字"}。score是0-100的综合运势分数。`;

  const userPrompt = `请为以下人士推算运势：
- 性别：${genderText}
- 年龄：${age}岁
- 生辰：${birthInfo}
- 生肖：${zodiac}
- 五行：${element}
- 所问：${q}
- ${chainInfo}

请给出今日运势解读。`;

  // Try AI first (always for premium, optional for free)
  const useAI = isPremium || !!apiKey;
  try {
    if (useAI && apiKey) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 500,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }],
        }),
      });
      const data = await res.json();
      const text = data.content[0].text;
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (jsonMatch) return JSON.parse(jsonMatch[0]);
    }
  } catch {}

  // Local fallback: deterministic but feels random per user
  return localFortune(wallet, year, gender, question);
}

// ── Helpers ──
function getZodiac(year) {
  const animals = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
  return animals[(year - 4) % 12];
}
function getElement(year) {
  const elements = ['金','金','水','水','木','木','火','火','土','土'];
  return elements[year % 10];
}
function getHourZodiac() {
  const h = new Date().getHours();
  const z = ['子时','丑时','寅时','卯时','辰时','巳时','午时','未时','申时','酉时','戌时','亥时'];
  return z[Math.floor((h+1)/2)%12];
}

function ms(key) { return i18n[currentLang]?.[key] || key; }
function toast(key) {
  const msg = ms(key) || key;
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2500);
}
