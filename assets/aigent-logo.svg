<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变: 电光蓝 → 紫 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#FF00E5"/>
    </linearGradient>

    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="50%" stop-color="#0F0F2E"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>

    <!-- 光晕渐变 -->
    <radialGradient id="glowGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#7B2FFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- 内部发光 -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- 金属质感 -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="30%" stop-color="#00C8FF"/>
      <stop offset="70%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF00E5"/>
    </linearGradient>

    <!-- 滤镜: 霓虹发光 -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 柔和发光 -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 外圈旋转渐变 -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="25%" stop-color="#7B2FFF"/>
      <stop offset="50%" stop-color="#FF00E5"/>
      <stop offset="75%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="252" fill="url(#bgGrad)" stroke="url(#ringGrad)" stroke-width="4"/>
  <circle cx="256" cy="256" r="248" fill="url(#glowGrad)"/>

  <!-- 背景网格线 - 代表 AI 神经网络 -->
  <g opacity="0.08" stroke="#00F0FF" stroke-width="0.5">
    <line x1="60" y1="100" x2="452" y2="100"/>
    <line x1="60" y1="160" x2="452" y2="160"/>
    <line x1="60" y1="220" x2="452" y2="220"/>
    <line x1="60" y1="292" x2="452" y2="292"/>
    <line x1="60" y1="352" x2="452" y2="352"/>
    <line x1="60" y1="412" x2="452" y2="412"/>
    <line x1="100" y1="60" x2="100" y2="452"/>
    <line x1="160" y1="60" x2="160" y2="452"/>
    <line x1="220" y1="60" x2="220" y2="452"/>
    <line x1="292" y1="60" x2="292" y2="452"/>
    <line x1="352" y1="60" x2="352" y2="452"/>
    <line x1="412" y1="60" x2="412" y2="452"/>
  </g>

  <!-- 网格节点亮点 -->
  <g opacity="0.15">
    <circle cx="160" cy="160" r="2" fill="#00F0FF"/>
    <circle cx="352" cy="160" r="2" fill="#7B2FFF"/>
    <circle cx="160" cy="352" r="2" fill="#7B2FFF"/>
    <circle cx="352" cy="352" r="2" fill="#FF00E5"/>
    <circle cx="256" cy="100" r="1.5" fill="#00F0FF"/>
    <circle cx="256" cy="412" r="1.5" fill="#FF00E5"/>
    <circle cx="100" cy="256" r="1.5" fill="#00F0FF"/>
    <circle cx="412" cy="256" r="1.5" fill="#FF00E5"/>
  </g>

  <!-- 数据流连线 - 环绕 A 字母 -->
  <g opacity="0.2" stroke="url(#mainGrad)" stroke-width="0.8" fill="none">
    <!-- 左上节点连接 -->
    <path d="M130 180 L190 230"/>
    <path d="M150 150 L210 210"/>
    <!-- 右上节点连接 -->
    <path d="M382 180 L322 230"/>
    <path d="M362 150 L302 210"/>
    <!-- 左下节点连接 -->
    <path d="M130 332 L190 282"/>
    <path d="M150 362 L210 302"/>
    <!-- 右下节点连接 -->
    <path d="M382 332 L322 282"/>
    <path d="M362 362 L302 302"/>
  </g>

  <!-- 核心 A 字母 - AI 的象征 -->
  <g filter="url(#neonGlow)">
    <!-- A 主形状 -->
    <polygon points="256,90 120,380 175,380 208,300 304,300 337,380 392,380"
             fill="none" stroke="url(#mainGrad)" stroke-width="10"
             stroke-linejoin="round"/>
    <!-- A 中间横杠 -->
    <line x1="185" y1="310" x2="327" y2="310"
          stroke="url(#mainGrad)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- A 内部填充 (半透明渐变) -->
  <polygon points="256,100 130,370 175,370 208,300 304,300 337,370 382,370"
           fill="url(#innerGlow)" stroke="none"/>
  <line x1="185" y1="310" x2="327" y2="310"
        stroke="#00F0FF" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

  <!-- AI 脑纹回路 - A 左侧 -->
  <g filter="url(#softGlow)" stroke="#00F0FF" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M110 200 Q140 200 150 230 Q160 260 180 250"/>
    <circle cx="110" cy="200" r="3" fill="#00F0FF" stroke="none"/>
    <circle cx="180" cy="250" r="2" fill="#00F0FF" stroke="none"/>
    <path d="M100 240 Q130 240 145 260 Q160 280 185 270"/>
    <circle cx="100" cy="240" r="2.5" fill="#00F0FF" stroke="none"/>
  </g>

  <!-- AI 脑纹回路 - A 右侧 -->
  <g filter="url(#softGlow)" stroke="#FF00E5" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M402 200 Q372 200 362 230 Q352 260 332 250"/>
    <circle cx="402" cy="200" r="3" fill="#FF00E5" stroke="none"/>
    <circle cx="332" cy="250" r="2" fill="#FF00E5" stroke="none"/>
    <path d="M412 240 Q382 240 367 260 Q352 280 327 270"/>
    <circle cx="412" cy="240" r="2.5" fill="#FF00E5" stroke="none"/>
  </g>

  <!-- 顶部 AI 核心节点 -->
  <circle cx="256" cy="82" r="6" fill="#00F0FF" filter="url(#neonGlow)"/>
  <circle cx="256" cy="82" r="3" fill="#FFFFFF"/>

  <!-- 外圈装饰弧线 - 科技感 -->
  <g filter="url(#softGlow)" stroke="url(#ringGrad)" stroke-width="1.5" fill="none" stroke-dasharray="8 4" opacity="0.4">
    <circle cx="256" cy="256" r="230"/>
  </g>

  <!-- 数据脉冲点 - 外圈 -->
  <g opacity="0.6">
    <circle cx="256" cy="26" r="3" fill="#00F0FF">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="486" r="3" fill="#FF00E5">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="26" cy="256" r="3" fill="#7B2FFF">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="486" cy="256" r="3" fill="#00F0FF">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 底部文字: AIGENT -->
  <g filter="url(#softGlow)">
    <text x="256" y="455" text-anchor="middle"
          font-family="'Courier New', monospace" font-size="36" font-weight="bold"
          fill="url(#mainGrad)" letter-spacing="8"
          opacity="0.85">AIGENT</text>
  </g>

  <!-- $ 符号 -->
  <text x="70" y="145" font-family="'Courier New', monospace" font-size="28" font-weight="bold"
        fill="#00F0FF" opacity="0.35">$</text>
</svg>
